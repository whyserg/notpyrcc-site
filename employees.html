<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Сотрудники — SkyLabs</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="particlesCanvas"></canvas>
  <div class="cursor-dot" id="cursorDot"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <div class="mobile-menu" id="mobileMenu">
    <ul>
      <li><a href="index.html" class="menu-link">Главная</a></li>
      <li><a href="projects.html" class="menu-link">Проекты</a></li>
      <li><a href="startups.html" class="menu-link">Активные стартапы</a></li>
      <li><a href="courses.html" class="menu-link">Курсы</a></li>
      <li><a href="employees.html" class="menu-link">Сотрудники</a></li>
    </ul>
  </div>
  <div class="menu-overlay" id="menuOverlay"></div>

  <div id="skeleton">
    <div class="skeleton-avatar"></div>
    <div class="skeleton-line" style="width:60%;"></div>
    <div class="skeleton-line" style="width:80%;"></div>
    <div class="skeleton-line" style="width:50%;"></div>
  </div>

  <div class="glass-container" id="mainContainer" style="display:none;">

    <nav>
      <div class="burger" id="burgerBtn">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="search-mobile">
        <div class="search-wrapper">
          <i class="fas fa-search"></i>
          <input type="text" class="search-input" placeholder="Поиск..." />
        </div>
      </div>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link">Главная</a></li>
        <li><a href="projects.html" class="nav-link">Проекты</a></li>
        <li><a href="startups.html" class="nav-link">Активные стартапы</a></li>
        <li><a href="courses.html" class="nav-link">Курсы</a></li>
        <li><a href="employees.html" class="nav-link active">Сотрудники</a></li>
      </ul>
    </nav>

    <div class="search-desktop">
      <div class="search-wrapper">
        <i class="fas fa-search"></i>
        <input type="text" class="search-input" placeholder="Поиск..." />
      </div>
    </div>

    <section id="employees">
      <h2 class="section-title gradient-text">Сотрудники</h2>
      <div class="cards-grid">
        <!-- Карточка 1: Izzi pussi -->
        <div class="card-item employee-card searchable-item" data-employee="1">
          <img src="avatar.jpg" alt="Izzi pussi" class="employee-avatar">
          <h3>Izzi pussi</h3>
          <p class="employee-role" style="color: #b388ff;">БОСС НАХ</p>
          <button class="employee-detail-btn link-btn">Подробнее</button>
        </div>

        <!-- Карточка 2: Mishka -->
        <div class="card-item employee-card searchable-item" data-employee="2">
          <img src="mishka.jpg" alt="Mishka" class="employee-avatar">
          <h3>Mishka</h3>
          <p class="employee-role" style="color: #ff5252;">ПРАВАЯ РУКА НАХ</p>
          <button class="employee-detail-btn link-btn">Подробнее</button>
        </div>
      </div>
    </section>

    <!-- Модальное окно (универсальное) -->
    <div id="employeeModal" class="modal">
      <div class="modal-content">
        <span class="close-modal">&times;</span>
        <div class="modal-body" id="modalBody">
          <!-- Здесь будет заполняться контент (имя, роль, описание, соцсети) -->
        </div>
        <!-- Аудиоплеер для модалки (общий, но src меняется) -->
        <div class="custom-audio-player" id="modalAudioPlayer">
          <audio id="modalAudio" loop>
            <source src="" type="audio/mpeg">
          </audio>
          <div class="player-controls">
            <button id="modalPlayBtn" class="play-btn">
              <i class="fas fa-play"></i>
            </button>
            <div class="progress-container">
              <span class="current-time" id="modalCurrentTime">0:00</span>
              <input type="range" id="modalProgressBar" class="progress-bar" value="0" step="0.1" min="0" max="100">
              <span class="duration" id="modalDurationTime">0:00</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <footer>
      © <span id="year"></span> Все права защищены. Сайт разработан с ❤️
    </footer>
  </div>

  <button id="scrollTopBtn" class="scroll-top-btn"><i class="fas fa-arrow-up"></i></button>

  <script src="script.js"></script>
</body>
</html>
